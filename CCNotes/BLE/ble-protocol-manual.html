<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLE 协议交互报文完整手册</title>
<style>
/* ==================== CSS Reset ==================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
img,picture,video,canvas,svg{display:block;max-width:100%}
input,button,textarea,select{font:inherit}
button{cursor:pointer;background:none;border:none;color:inherit}
a{color:inherit;text-decoration:none}
ul,ol{list-style:none}

/* ==================== CSS Custom Properties ==================== */
:root{
  --bg:#FFFFFF;
  --text:#1a1a2e;
  --text-secondary:#64748B;
  --surface:#F8FAFC;
  --surface-hover:#F1F5F9;
  --border:#E2E8F0;
  --blue:#3B82F6;
  --cyan:#06B6D4;
  --green:#10B981;
  --purple:#8B5CF6;
  --orange:#F97316;
  --gray:#9CA3AF;
  --red:#EF4444;
  --sidebar-width:260px;
  --topbar-height:48px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Helvetica,Arial,sans-serif;
  --font-mono:"SF Mono","Fira Code","Fira Mono","Roboto Mono","JetBrains Mono",Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
}
[data-theme="dark"]{
  --bg:#0F172A;
  --text:#E2E8F0;
  --text-secondary:#94A3B8;
  --surface:#1E293B;
  --surface-hover:#334155;
  --border:#334155;
  --blue:#60A5FA;
  --cyan:#22D3EE;
  --green:#34D399;
  --purple:#A78BFA;
  --orange:#FB923C;
  --gray:#6B7280;
  --red:#F87171;
}

/* ==================== Base ==================== */
body{
  font-family:var(--font);
  color:var(--text);
  background:var(--bg);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* ==================== Topbar ==================== */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  height:var(--topbar-height);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:10px;
  z-index:100;
  -webkit-backdrop-filter:blur(8px);
  backdrop-filter:blur(8px);
}
.topbar__hamburger{
  display:none;
  font-size:22px;
  width:32px;height:32px;
  align-items:center;
  justify-content:center;
  border-radius:6px;
  flex-shrink:0;
  transition:background .2s;
}
.topbar__hamburger:hover{background:var(--surface-hover);}
.topbar__theme-btn{
  font-size:20px;
  width:32px;height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
  flex-shrink:0;
  transition:background .2s;
}
.topbar__theme-btn:hover{background:var(--surface-hover);}
.topbar__title{
  font-size:15px;
  font-weight:600;
  white-space:nowrap;
  color:var(--text);
  flex-shrink:0;
}
.topbar__spacer{flex:1;min-width:16px;}
.topbar__search{
  position:relative;
  display:flex;
  align-items:center;
  flex-shrink:0;
}
.topbar__search-icon{
  position:absolute;
  left:10px;
  font-size:14px;
  pointer-events:none;
  color:var(--text-secondary);
  line-height:1;
}
.topbar__search-input{
  width:200px;
  height:32px;
  padding:0 12px 0 32px;
  border:1px solid var(--border);
  border-radius:6px;
  background:var(--bg);
  color:var(--text);
  font-size:13px;
  outline:none;
  transition:border-color .2s,width .2s;
}
.topbar__search-input:focus{border-color:var(--blue);}
.topbar__search-input::placeholder{color:var(--text-secondary);}

/* ==================== Layout ==================== */
.layout{
  display:flex;
  flex:1;
  margin-top:var(--topbar-height);
  min-height:calc(100vh - var(--topbar-height));
}

/* ==================== Sidebar ==================== */
.sidebar{
  width:var(--sidebar-width);
  flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding:8px 0;
}
.sidebar::-webkit-scrollbar{width:6px;}
.sidebar::-webkit-scrollbar-track{background:transparent;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ==================== Main Content ==================== */
.main{
  flex:1;
  overflow-y:auto;
  padding:32px 40px;
  background:var(--bg);
}
.main::-webkit-scrollbar{width:8px;}
.main::-webkit-scrollbar-track{background:transparent;}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ==================== Responsive: ≤900px (Tablet / Mobile) ==================== */
@media(max-width:900px){
  .topbar__hamburger{display:flex;}
  .sidebar{
    position:fixed;
    top:var(--topbar-height);
    left:0;
    width:var(--sidebar-width);
    height:calc(100vh - var(--topbar-height));
    transform:translateX(-100%);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:90;
    border-right:1px solid var(--border);
  }
  .sidebar.open{
    transform:translateX(0);
  }
}

/* ==================== Responsive: ≤600px (Small Mobile) ==================== */
@media(max-width:600px){
  .topbar__search-input{width:140px;}
  .topbar__title{font-size:13px;}
  .main{padding:20px 16px;}
}
</style>
</head>
<body>

<!-- ==================== Topbar ==================== -->
<header class="topbar">
  <button class="topbar__hamburger" id="hamburgerBtn" aria-label="打开侧边栏">☰</button>
  <button class="topbar__theme-btn" id="themeToggle" aria-label="切换主题">☀️</button>
  <span class="topbar__title">BLE 协议交互报文完整手册</span>
  <div class="topbar__spacer"></div>
  <div class="topbar__search">
    <span class="topbar__search-icon">🔍</span>
    <input class="topbar__search-input" type="text" placeholder="搜索..." aria-label="搜索">
  </div>
</header>

<!-- ==================== Layout ==================== -->
<div class="layout">
  <!-- Sidebar Navigation -->
  <nav class="sidebar" id="sidebarContent"></nav>
  <!-- Main Content Area -->
  <main class="main" id="mainContent">内容加载中...</main>
</div>

<script>
(function(){
  'use strict';

  // ==================== Theme Toggle ====================
  (function initTheme(){
    var html = document.documentElement;
    var btn = document.getElementById('themeToggle');
    if(!btn) return;

    function getPreferred(){
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setTheme(theme){
      html.setAttribute('data-theme', theme);
      btn.textContent = theme === 'dark' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    }

    // Only from system preference -- no localStorage
    setTheme(getPreferred());

    // Toggle on click
    btn.addEventListener('click', function(){
      var current = html.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // React to OS theme changes
    var mq = window.matchMedia('(prefers-color-scheme: dark)');
    function onSystemChange(e){
      setTheme(e.matches ? 'dark' : 'light');
    }
    if(mq.addEventListener){
      mq.addEventListener('change', onSystemChange);
    } else if(mq.addListener){
      mq.addListener(onSystemChange);
    }
  })();

  // ==================== Mobile Sidebar Toggle ====================
  (function initSidebar(){
    var hamburger = document.getElementById('hamburgerBtn');
    var sidebar = document.getElementById('sidebarContent');
    var main = document.getElementById('mainContent');
    if(!hamburger || !sidebar) return;

    hamburger.addEventListener('click', function(e){
      e.stopPropagation();
      sidebar.classList.toggle('open');
    });

    // Clicking main content closes sidebar on mobile
    if(main){
      main.addEventListener('click', function(){
        if(window.innerWidth <= 900){
          sidebar.classList.remove('open');
        }
      });
    }

    // Close sidebar on window resize crossing the 900px boundary
    var prevWidth = window.innerWidth;
    window.addEventListener('resize', function(){
      var cur = window.innerWidth;
      if(prevWidth <= 900 && cur > 900){
        sidebar.classList.remove('open');
      }
      prevWidth = cur;
    });
  })();

})();
</script>
</body>
</html>
